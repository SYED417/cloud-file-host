{% extends "base.html" %}

{% block title %}Sign in · Cloud File Host{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">

        <div class="card border-0 shadow-sm mt-4">
            <div class="card-body p-4">

                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock display-5 text-primary"></i>
                    <h1 class="h4 fw-semibold mt-2 mb-0">Welcome back</h1>
                    <p class="text-secondary small mb-0">Sign in to access your dashboard</p>
                </div>

                <form action="{{ url_for('login') }}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" name="email" id="email"
                               class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" id="password"
                               class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
                    </button>
                </form>

                {% if registration_open %}
                <p class="text-center text-secondary small mt-3 mb-0">
                    Don't have an account?
                    <a href="{{ url_for('register') }}" class="text-decoration-none">Register</a>
                </p>
                {% endif %}

            </div>
        </div>

    </div>
</div>
{% endblock %}
